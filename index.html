  <body>
    <div id="root"></div>
    <script>
      // Capture postMessage events that arrive before our JS modules load.
      // SN mobile sends 'component-registered' immediately when the iframe
      // is created — often before any module script has executed. Without
      // this buffer, the relay misses registration and never connects.
      window.__earlyMsgs=[];
      function __earlyH(e){window.__earlyMsgs.push({data:e.data,origin:e.origin})}
      window.addEventListener('message',__earlyH);
      document.addEventListener('message',__earlyH);
      window.__removeEarlyHandler=function(){
        window.removeEventListener('message',__earlyH);
        document.removeEventListener('message',__earlyH);
      };
    </script>
  </body>
